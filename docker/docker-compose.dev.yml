version: '3.9'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: enterprise-sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "EnterpriseStr0ng!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "EnterpriseStr0ng!" -C -Q "SELECT 1" || exit 1
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - enterprise_net

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: enterprise-db-init
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ../database:/scripts:ro
    environment:
      MSSQL_SA_PASSWORD: "EnterpriseStr0ng!"
    entrypoint: ["/bin/bash", "/scripts/init.sh"]
    networks:
      - enterprise_net
    restart: "no"

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: enterprise-backend
    restart: unless-stopped
    ports:
      - "5001:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      FRONTEND_URL: "http://localhost:8080"
      DB_SERVER: sqlserver
      DB_PORT: 1433
      DB_NAME: EnterpriseCMS
      DB_USER: sa
      DB_PASSWORD: "EnterpriseStr0ng!"
      JWT_SECRET: "enterprise-jwt-secret-key-minimum-32-chars-xxxx"
      JWT_EXPIRES_IN: "15m"
      JWT_REFRESH_SECRET: "enterprise-refresh-secret-different-32chars-xxxx"
      JWT_REFRESH_EXPIRES_IN: "7d"
      BCRYPT_ROUNDS: "12"
      UPLOAD_PATH: "/app/uploads"
      MAX_FILE_SIZE: "10485760"
      RATE_LIMIT_WINDOW_MS: "900000"
      RATE_LIMIT_MAX: "500"
      AUTH_RATE_LIMIT_MAX: "20"
      SMTP_HOST: "smtp.gmail.com"
      SMTP_PORT: "587"
      SMTP_SECURE: "false"
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM_NAME: "TechShield Solutions"
      SMTP_FROM_EMAIL: "noreply@techshield.com"
      ADMIN_EMAIL: "admin@techshield.com"
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    depends_on:
      sqlserver:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 25s
    networks:
      - enterprise_net

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: "/api"
    container_name: enterprise-frontend
    restart: unless-stopped
    networks:
      - enterprise_net

  nginx:
    image: nginx:1.25-alpine
    container_name: enterprise-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx-dev.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads_data:/var/uploads:ro
    depends_on:
      - backend
      - frontend
    networks:
      - enterprise_net

volumes:
  sqlserver_data:
  uploads_data:
  logs_data:

networks:
  enterprise_net:
    driver: bridge
